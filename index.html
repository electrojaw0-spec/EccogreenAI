// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function EcoLab() {
  const [activeField, setActiveField] = useState("electrical");
  const [activeTab, setActiveTab] = useState("lab");
  const [workspace, setWorkspace] = useState([]);
  const [connections, setConnections] = useState([]);
  const [selectedItem, setSelectedItem] = useState(null);
  const [connecting, setConnecting] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [chatMessages, setChatMessages] = useState([
    { role: "assistant", content: "👋 Hi! I'm **Ecogreen AI**. Drop components into your workspace and I'll analyze your project for sustainability and innovation. Click **Analyze Project** anytime!" }
  ]);
  const [chatInput, setChatInput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [scores, setScores] = useState(null);
  const [leaderboard, setLeaderboard] = useState(LEADERBOARD_INITIAL);
  const [toast, setToast] = useState(null);
  const [catFilter, setCatFilter] = useState("All");
  const [simRunning, setSimRunning] = useState(false);
  const [simData, setSimData] = useState({});
  const [dragOver, setDragOver] = useState(false);
  const [projectName, setProjectName] = useState("My Eco Project");
  const [savedProjects, setSavedProjects] = useState([]);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("or_api_key") || "");
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [keyDraft, setKeyDraft] = useState("");
  const workspaceRef = useRef(null);
  const simInterval = useRef(null);
  const dragCounter = useRef(0);

  const fieldData = FIELDS[activeField];
  const allComponents = fieldData.components;
  const categories = ["All", ...new Set(allComponents.map(c => c.cat))];
  const filtered = allComponents.filter(c =>
    (catFilter === "All" || c.cat === catFilter) &&
    (c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.cat.toLowerCase().includes(searchTerm.toLowerCase()))
  );

  // ─── DRAG & DROP ────────────────────────────────────────────────────────────

  const handleDragStart = useCallback((e, comp) => {
    e.dataTransfer.setData("component", JSON.stringify(comp));
  }, []);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    dragCounter.current = 0;
    setDragOver(false);
    const data = e.dataTransfer.getData("component");
    if (!data) return;
    const comp = JSON.parse(data);
    const rect = workspaceRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left - 48;
    const y = e.clientY - rect.top - 48;
    const id = `${comp.id}_${Date.now()}`;
    setWorkspace(prev => [...prev, { ...comp, uid: id, x: Math.max(0, x), y: Math.max(0, y) }]);
    showToast(`Added ${comp.name} to workspace`);
  }, []);

  const moveItem = useCallback((uid, dx, dy) => {
    setWorkspace(prev => prev.map(w => w.uid === uid ? { ...w, x: Math.max(0, w.x + dx), y: Math.max(0, w.y + dy) } : w));
  }, []);

  const removeItem = useCallback((uid) => {
    setWorkspace(prev => prev.filter(w => w.uid !== uid));
    setConnections(prev => prev.filter(c => c.from !== uid && c.to !== uid));
    if (selectedItem === uid) setSelectedItem(null);
  }, [selectedItem]);

  // ─── CONNECTIONS ────────────────────────────────────────────────────────────

  const handleNodeClick = useCallback((uid) => {
    if (!connecting) {
      setConnecting(uid);
      showToast("Click another component to connect");
    } else if (connecting !== uid) {
      const exists = connections.find(c => (c.from === connecting && c.to === uid) || (c.from === uid && c.to === connecting));
      if (!exists) {
        setConnections(prev => [...prev, { id: Date.now(), from: connecting, to: uid }]);
        showToast("Components connected!");
      }
      setConnecting(null);
    } else {
      setConnecting(null);
    }
  }, [connecting, connections]);

  // ─── SIMULATION ──────────────────────────────────────────────────────────────

  const runSimulation = useCallback(() => {
    if (simRunning) {
      clearInterval(simInterval.current);
      setSimRunning(false);
      setSimData({});
      return;
    }
    setSimRunning(true);
    let t = 0;
    simInterval.current = setInterval(() => {
      t++;
      const newData = {};
      workspace.forEach(item => {
        if (item.power > 0) newData[item.uid] = { value: (item.power * (0.85 + 0.15 * Math.sin(t * 0.3))).toFixed(0), unit: "W", type: "gen" };
        else if (item.load) newData[item.uid] = { value: (item.load * (0.9 + 0.1 * Math.sin(t * 0.2))).toFixed(0), unit: "W", type: "load" };
        else if (item.cat === "Storage") newData[item.uid] = { value: Math.min(100, (t * 2) % 120).toFixed(0), unit: "%", type: "soc" };
        else if (item.cat === "Control" || item.cat === "MCU") newData[item.uid] = { value: "ACTIVE", unit: "", type: "ctrl" };
      });
      setSimData(newData);
    }, 800);
  }, [simRunning, workspace]);

  useEffect(() => () => clearInterval(simInterval.current), []);

  // ─── AI ANALYSIS ─────────────────────────────────────────────────────────────

  const analyzeProject = useCallback(async () => {
    if (workspace.length === 0) { showToast("Add components first!", "warn"); return; }
    if (!apiKey) { setShowKeyInput(true); showToast("Enter your OpenRouter API key first!", "warn"); return; }
    setAiLoading(true);
    const componentList = workspace.map(w => `${w.name} (${w.cat})`).join(", ");
    const renewableCount = workspace.filter(w => w.renewable).length;
    const connCount = connections.length;
    const prompt = `You are Ecogreen AI, an expert sustainable engineering assistant for the Eco Lab platform at USET, The Gambia.

Analyze this ${fieldData.label} project:
- Project name: "${projectName}"
- Components (${workspace.length}): ${componentList}
- Connections: ${connCount}
- Renewable components: ${renewableCount}/${workspace.length}

Respond ONLY with a valid JSON object (no markdown, no extra text):
{
  "sustainabilityScore": <0-100>,
  "innovationScore": <0-100>,
  "summary": "<2-sentence project summary>",
  "strengths": ["<strength1>", "<strength2>", "<strength3>"],
  "improvements": ["<improvement1>", "<improvement2>", "<improvement3>"],
  "ecoTip": "<one specific eco tip for this project>",
  "verdict": "<one sentence overall verdict>"
}`;

    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}`, "HTTP-Referer": window.location.href, "X-Title": "Eco Lab" },
        body: JSON.stringify({
          model: "anthropic/claude-3.5-sonnet",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.choices?.[0]?.message?.content || "";
      let parsed;
      try { parsed = JSON.parse(text.replace(/```json|```/g, "").trim()); }
      catch { parsed = { sustainabilityScore: Math.min(100, 40 + renewableCount * 10 + connCount * 2), innovationScore: Math.min(100, 30 + workspace.length * 3), summary: "Your project shows strong engineering fundamentals.", strengths: ["Good component selection", "Renewable integration", "System connectivity"], improvements: ["Add more renewable sources", "Include energy storage", "Add monitoring sensors"], ecoTip: "Consider adding a smart controller to optimize energy flow.", verdict: "A solid eco-engineering project with room to grow!" }; }
      setScores(parsed);
      setChatMessages(prev => [...prev, { role: "assistant", content: `✅ **Analysis Complete!**\n\n📊 **Sustainability:** ${parsed.sustainabilityScore}/100\n🚀 **Innovation:** ${parsed.innovationScore}/100\n\n${parsed.summary}\n\n💡 *Eco Tip:* ${parsed.ecoTip}\n\n🏆 **Verdict:** ${parsed.verdict}` }]);
      showToast("Analysis complete!", "success");
    } catch (err) {
      const msg = err.message?.includes("401") ? "Invalid API key. Check your OpenRouter key." : "⚠️ AI unavailable. Check your key and connection.";
      setChatMessages(prev => [...prev, { role: "assistant", content: msg }]);
      showToast(msg, "warn");
    }
    setAiLoading(false);
  }, [workspace, connections, projectName, fieldData, apiKey]);

  const sendChat = useCallback(async () => {
    if (!chatInput.trim()) return;
    if (!apiKey) { setShowKeyInput(true); showToast("Enter your OpenRouter API key first!", "warn"); return; }
    const userMsg = chatInput.trim();
    setChatInput("");
    setChatMessages(prev => [...prev, { role: "user", content: userMsg }]);
    setAiLoading(true);
    const componentList = workspace.map(w => w.name).join(", ") || "none yet";
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}`, "HTTP-Referer": window.location.href, "X-Title": "Eco Lab" },
        body: JSON.stringify({
          model: "anthropic/claude-3.5-sonnet",
          max_tokens: 600,
          messages: [
            { role: "system", content: `You are Ecogreen AI, a friendly sustainable engineering assistant for USET students in The Gambia. Current workspace has: ${componentList} in ${fieldData.label}. Be concise, helpful, and always encourage eco-friendly solutions. Use emojis sparingly.` },
            { role: "user", content: userMsg }
          ]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.choices?.[0]?.message?.content || "Great question! Keep exploring eco-engineering solutions.";
      setChatMessages(prev => [...prev, { role: "assistant", content: text }]);
    } catch {
      setChatMessages(prev => [...prev, { role: "assistant", content: "I'm having trouble connecting. Check your API key and try again!" }]);
    }
    setAiLoading(false);
  }, [chatInput, workspace, fieldData, apiKey]);

  // ─── PROJECT SAVE/LOAD ───────────────────────────────────────────────────────

  const saveProject = useCallback(() => {
    const project = { id: Date.now(), name: projectName, field: activeField, workspace, connections, scores, saved: new Date().toLocaleDateString() };
    setSavedProjects(prev => [project, ...prev.slice(0, 9)]);
    showToast("Project saved!", "success");
  }, [projectName, activeField, workspace, connections, scores]);

  const loadProject = useCallback((project) => {
    setActiveField(project.field);
    setWorkspace(project.workspace);
    setConnections(project.connections);
    setScores(project.scores);
    setProjectName(project.name);
    setActiveTab("lab");
    showToast(`Loaded "${project.name}"`);
  }, []);

  const exportProject = useCallback(() => {
    const data = JSON.stringify({ name: projectName, field: activeField, workspace, connections, scores }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${projectName.replace(/\s+/g, "_")}.json`; a.click();
    showToast("Project exported!", "success");
  }, [projectName, activeField, workspace, connections, scores]);

  const loadEcoProject = useCallback((preset) => {
    const field = FIELDS[preset.field];
    const comps = preset.components.map((id, i) => {
      const comp = field.components.find(c => c.id === id);
      if (!comp) return null;

                    <div style={{ fontSize: 10, color: "#00e5a0", fontWeight: 700, marginBottom: 4 }}>ECO TIP</div>
                    <div style={{ fontSize: 11, color: "#94a3b8" }}>{scores.ecoTip}</div>
                  </div>
                  <button className="action-btn" onClick={addToLeaderboard} style={{ background: "rgba(245,158,11,0.12)", color: "#f59e0b", width: "100%" }}>🏆 Add to Leaderboard</button>
                </div>
              ) : (
                <div style={{ textAlign: "center", color: "#334155", fontSize: 12, paddingTop: 40 }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>📊</div>
                  Analyze your project to see scores
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── LEADERBOARD TAB ── */}
        {activeTab === "leaderboard" && (
          <div style={{ flex: 1, padding: 32, overflowY: "auto" }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 24, fontWeight: 700, marginBottom: 8 }}>🏆 Sustainability Leaderboard</div>
            <div style={{ fontSize: 13, color: "#475569", marginBottom: 24 }}>Top eco-engineering projects ranked by sustainability score</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 720 }}>
              {leaderboard.map((entry, i) => (
                <div key={i} style={{ background: i === 0 ? "rgba(245,158,11,0.08)" : "rgba(255,255,255,0.03)", border: `1.5px solid ${i === 0 ? "rgba(245,158,11,0.25)" : "rgba(255,255,255,0.07)"}`, borderRadius: 16, padding: "14px 20px", display: "flex", alignItems: "center", gap: 16 }}>
                  <div style={{ fontSize: 24, width: 40, textAlign: "center" }}>{["🥇", "🥈", "🥉", "4️⃣", "5️⃣", "6️⃣", "7️⃣", "8️⃣", "9️⃣", "🔟"][i]}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{entry.name}</div>
                    <div style={{ fontSize: 11, color: "#475569" }}>by {entry.user} · {FIELDS[entry.field]?.label}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "#64748b" }}>Sustainability</div>
                    <div style={{ fontWeight: 700, color: "#00e5a0", fontSize: 18 }}>{entry.score}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "#64748b" }}>Innovation</div>
                    <div style={{ fontWeight: 700, color: "#a78bfa", fontSize: 18 }}>{entry.innovation}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── SAVED PROJECTS ── */}
        {activeTab === "projects" && (
          <div style={{ flex: 1, padding: 32, overflowY: "auto" }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 24, fontWeight: 700, marginBottom: 24 }}>💾 Saved Projects</div>
            {savedProjects.length === 0 ? (
              <div style={{ textAlign: "center", color: "#334155", paddingTop: 60 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📂</div>
                <div>No saved projects yet. Save from the Lab tab!</div>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
                {savedProjects.map(p => (
                  <div key={p.id} style={{ background: "rgba(255,255,255,0.03)", border: "1.5px solid rgba(255,255,255,0.07)", borderRadius: 16, padding: 18 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "#475569", marginTop: 4 }}>{FIELDS[p.field]?.label} · {p.workspace.length} components · Saved {p.saved}</div>
                    {p.scores && (
                      <div style={{ display: "flex", gap: 12, marginTop: 10 }}>
                        <span style={{ fontSize: 11, color: "#00e5a0" }}>🌿 {p.scores.sustainabilityScore}/100</span>
                        <span style={{ fontSize: 11, color: "#a78bfa" }}>🚀 {p.scores.innovationScore}/100</span>
                      </div>
                    )}
                    <button className="action-btn" onClick={() => loadProject(p)} style={{ background: "rgba(0,229,160,0.12)", color: "#00e5a0", width: "100%", marginTop: 12 }}>Load Project</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── TEMPLATES TAB ── */}
        {activeTab === "templates" && (
          <div style={{ flex: 1, padding: 32, overflowY: "auto" }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 24, fontWeight: 700, marginBottom: 8 }}>⚡ Eco Project Templates</div>
            <div style={{ fontSize: 13, color: "#475569", marginBottom: 24 }}>Start with a pre-built eco project and customize it</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 16, maxWidth: 900 }}>
              {ECO_PROJECTS.map((proj, i) => {
                const field = FIELDS[proj.field];
                return (
                  <div key={i} style={{ background: "rgba(0,229,160,0.04)", border: "1.5px solid rgba(0,229,160,0.12)", borderRadius: 16, padding: 20 }}>
                    <div style={{ fontSize: 28, marginBottom: 8 }}>{field.icon}</div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{proj.name}</div>
                    <div style={{ fontSize: 11, color: "#475569", marginTop: 4 }}>{field.label}</div>
                    <div style={{ fontSize: 11, color: "#334155", marginTop: 8 }}>Components: {proj.components.length}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>
                      {proj.components.map(id => {
                        const comp = field.components.find(c => c.id === id);
                        return comp ? <span key={id} style={{ fontSize: 9, background: "rgba(0,229,160,0.08)", border: "1px solid rgba(0,229,160,0.15)", borderRadius: 5, padding: "2px 6px", color: "#64748b" }}>{comp.icon} {comp.name}</span> : null;
                      })}
                    </div>
                    <button className="action-btn" onClick={() => loadEcoProject(proj)} style={{ background: "rgba(0,229,160,0.12)", color: "#00e5a0", width: "100%", marginTop: 14 }}>Load Template →</button>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop: 32 }}>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 18, fontWeight: 700, marginBottom: 12 }}>🌍 Quick Start Tips</div>
              {[
                ["Drag & Drop", "Drag components from the sidebar into the workspace"],
                ["Connect", "Click 🔗 on a component then click another to wire them"],
                ["Simulate", "Hit ▶ Simulate to see live power/load readings"],
                ["AI Analysis", "Click 🤖 AI Analyze to get sustainability & innovation scores"],
                ["Eco Points", "Use renewable components (marked ♻) for higher scores"],
              ].map(([title, desc]) => (
                <div key={title} style={{ display: "flex", gap: 12, marginBottom: 10 }}>
                  <div style={{ width: 6, height: 6, background: "#00e5a0", borderRadius: "50%", marginTop: 5, flexShrink: 0 }} />
                  <div><span style={{ fontWeight: 600, color: "#94a3b8" }}>{title}:</span> <span style={{ color: "#64748b", fontSize: 13 }}>{desc}</span></div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* TOAST */}
      {toast && (
        <div className="slide-in" style={{ position: "fixed", bottom: 24, right: 24, background: toast.type === "success" ? "rgba(0,229,160,0.15)" : toast.type === "warn" ? "rgba(245,158,11,0.15)" : "rgba(96,165,250,0.15)", border: `1px solid ${toast.type === "success" ? "rgba(0,229,160,0.3)" : toast.type === "warn" ? "rgba(245,158,11,0.3)" : "rgba(96,165,250,0.3)"}`, borderRadius: 12, padding: "10px 18px", fontSize: 13, color: "#e2e8f0", backdropFilter: "blur(12px)", zIndex: 999, maxWidth: 300 }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ─── WORKSPACE ITEM (defined outside EcoLab so React doesn't remount on re-render) ───
// If defined INSIDE EcoLab, React sees a new function reference every render and
// unmounts/remounts all items — destroying the drop target mid-drag.

function WorkspaceItem({ item, selectedItem, setSelectedItem, connecting, simData, moveItem, handleNodeClick, removeItem }) {
  const dragging = useRef(false);
  const startPos = useRef({ x: 0, y: 0 });
  const isSelected = selectedItem === item.uid;
  const isConnecting = connecting === item.uid;
  const sim = simData[item.uid];

  const onMouseDown = (e) => {
    if (e.target.closest(".ws-btn")) return;
    e.preventDefault();
    dragging.current = true;
    startPos.current = { x: e.clientX, y: e.clientY };
    const onMove = (ev) => {
      if (!dragging.current) return;
      moveItem(item.uid, ev.clientX - startPos.current.x, ev.clientY - startPos.current.y);
      startPos.current = { x: ev.clientX, y: ev.clientY };
    };
    const onUp = () => {
      dragging.current = false;
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  return (
    <div
      style={{
        position: "absolute", left: item.x, top: item.y,
        width: 96, cursor: "grab",
        zIndex: isSelected ? 20 : 10,
      }}
      onMouseDown={onMouseDown}
      onClick={() => setSelectedItem(isSelected ? null : item.uid)}
    >
      <div style={{
        background: isConnecting ? "rgba(0,229,160,0.25)" : isSelected ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.07)",
        border: isConnecting ? "2px solid #00e5a0" : isSelected ? "2px solid rgba(255,255,255,0.5)" : "1.5px solid rgba(255,255,255,0.12)",
        borderRadius: 16, padding: "10px 6px 8px", textAlign: "center",
        backdropFilter: "blur(8px)", transition: "all 0.2s",
        boxShadow: isSelected ? "0 0 20px rgba(0,229,160,0.3)" : "0 4px 16px rgba(0,0,0,0.4)",
      }}>
        <div style={{ fontSize: 28, lineHeight: 1.2 }}>{item.icon}</div>
        <div style={{ fontSize: 9, color: "#94a3b8", fontWeight: 600, marginTop: 4, lineHeight: 1.2 }}>{item.name}</div>
        {item.renewable && <div style={{ fontSize: 7, color: "#00e5a0", marginTop: 2 }}>♻ RENEWABLE</div>}
        {sim && (
          <div style={{ marginTop: 4, fontSize: 9, fontWeight: 700, color: sim.type === "gen" ? "#00e5a0" : sim.type === "load" ? "#f59e0b" : "#60a5fa", background: "rgba(0,0,0,0.3)", borderRadius: 6, padding: "2px 4px" }}>
            {sim.value}{sim.unit}
          </div>
        )}
        <div style={{ display: "flex", justifyContent: "center", gap: 4, marginTop: 6 }}>
          <button className="ws-btn" onClick={e => { e.stopPropagation(); handleNodeClick(item.uid); }}
            style={{ fontSize: 10, background: isConnecting ? "#00e5a0" : "rgba(0,229,160,0.2)", border: "none", borderRadius: 5, color: "#fff", padding: "2px 5px", cursor: "pointer" }} title="Connect">🔗</button>
          <button className="ws-btn" onClick={e => { e.stopPropagation(); removeItem(item.uid); }}
            style={{ fontSize: 10, background: "rgba(239,68,68,0.2)", border: "none", borderRadius: 5, color: "#fff", padding: "2px 5px", cursor: "pointer" }} title="Remove">✕</button>
        </div>
      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<EcoLab />);
  </script>
</body>
