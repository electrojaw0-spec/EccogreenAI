  // ========================= INITIAL STATE =========================
  const getInitialState = () => {
    const saved = localStorage.getItem(STORAGE_KEYS.appState);
    if (saved) {
      try { return JSON.parse(saved); } catch(e) { return { workspace: [], connections: [], selected: null, simulationTime: 0, logs: [], field: "electrical" }; }
    }
    return { workspace: [], connections: [], selected: null, simulationTime: 0, logs: [], field: "electrical" };
  };

  // ========================= REDUCER ENGINE =========================
  function reducer(state, action) {
    let newState;
    switch (action.type) {
      case "ADD": newState = { ...state, workspace: [...state.workspace, action.payload] }; break;
      case "MOVE": newState = { ...state, workspace: state.workspace.map(n => n.uid === action.uid ? { ...n, x: action.x, y: action.y } : n) }; break;
      case "REMOVE": newState = { ...state, workspace: state.workspace.filter(n => n.uid !== action.uid), connections: state.connections.filter(c => c.from !== action.uid && c.to !== action.uid) }; break;
      case "SELECT": newState = { ...state, selected: action.uid }; break;
      case "CONNECT": {
        if (action.from === action.to) return state;
        const exists = state.connections.find(c => (c.from === action.from && c.to === action.to) || (c.from === action.to && c.to === action.from));
        if (exists) return state;
        newState = { ...state, connections: [...state.connections, { id: Date.now(), from: action.from, to: action.to }] };
        break;
      }
      case "TICK": newState = { ...state, simulationTime: state.simulationTime + 1 }; break;
      case "LOG": newState = { ...state, logs: [action.log, ...state.logs].slice(0, 50) }; break;
      case "SET_FIELD": newState = { ...state, field: action.field }; break;
      case "CLEAR": newState = { workspace: [], connections: [], selected: null, simulationTime: 0, logs: [], field: state.field }; break;
      case "LOAD_STATE": newState = action.payload; break;
      default: return state;
    }
    localStorage.setItem(STORAGE_KEYS.appState, JSON.stringify(newState));
    return newState;
  }

  // ========================= PHYSICS ENGINE =========================
  function physicsEngine(nodes, connections, simTime) {
    let energy = 0, load = 0, stability = 0, voltageSum = 0, resistanceSum = 0, torqueSum = 0, stressLevel = 0;
    nodes.forEach(n => {
      energy += n.power || 0;
      load += n.load || 0;
      stability += n.stability || 50;
      voltageSum += n.voltage || 0;
      resistanceSum += n.resistance || 0;
      torqueSum += n.torque || 0;
      stressLevel += (n.load || 0) * 0.1;
    });
    const batteryNodes = nodes.filter(n => n.cat === "Storage");
    let batteryHealth = 100;
    if (batteryNodes.length > 0) batteryHealth = Math.max(0, 100 - (simTime * 0.1 * (batteryNodes[0].decay || 0.001)));
    const voltageDrop = resistanceSum > 0 ? (energy / (resistanceSum + 1)) * 0.1 : 0;
    const effectiveVoltage = Math.max(0, (voltageSum / (nodes.length || 1)) - voltageDrop);
    const gearRatio = nodes.filter(n => n.ratio).reduce((sum, n) => sum * (n.ratio || 1), 1);
    const torqueEfficiency = Math.min(1, torqueSum / (energy + 1) * 0.05);
    const effectiveTorque = torqueSum * torqueEfficiency * gearRatio;
    const structuralStress = Math.min(100, stressLevel / (nodes.length || 1));
    const finalStability = Math.max(0, Math.min(100, stability / (nodes.length || 1) - structuralStress * 0.2));
    const balance = energy - load;
    const systemHealth = (energy > 0 ? Math.min(100, (energy / (load + 1)) * 20) : 50);
    return { energy, load, stability: finalStability, balance, systemHealth, voltage: effectiveVoltage, resistance: resistanceSum, batteryHealth, torque: effectiveTorque, gearRatio, structuralStress, timestamp: Date.now() };
  }

  // ========================= AI BRAIN =========================
  function aiBrain(report, nodes) {
    const suggestions = [];
    let sustainabilityScore = 70, innovationScore = 65, riskLevel = "LOW";
    if (report.balance < -100) { suggestions.push("⚠️ Energy deficit: Add renewable sources"); sustainabilityScore -= 15; riskLevel = "HIGH"; }
    else if (report.balance > 500) { suggestions.push("⚡ Energy surplus: Optimize storage or grid feed-in"); innovationScore += 10; }
    else suggestions.push("✅ Energy balance nominal");
    if (report.stability < 60) { suggestions.push("🏗️ Structural instability detected: Reinforce components"); sustainabilityScore -= 10; riskLevel = "MEDIUM"; }
    if (report.voltage < 40 && report.voltage > 0) suggestions.push("🔌 Low voltage detected: Check resistance or add regulators");
    if (report.batteryHealth < 30) { suggestions.push("🔋 Battery degradation critical"); riskLevel = "CRITICAL"; }
    else if (report.batteryHealth < 60) suggestions.push("🔋 Battery health moderate: Monitor decay");
    const renewableCount = nodes.filter(n => n.renewable).length;
    if (renewableCount === 0 && nodes.length > 0) suggestions.push("🌱 Auto-design: Integrate renewable energy sources");
    else if (renewableCount > 0) sustainabilityScore += Math.min(20, renewableCount * 5);
    let failureProbability = 0;
    if (report.structuralStress > 70) failureProbability += 30;
    if (report.batteryHealth < 40) failureProbability += 25;
    if (report.voltage < 20) failureProbability += 20;
    if (failureProbability > 50) { suggestions.push(`⚠️ Predictive failure: ${failureProbability.toFixed(0)}% probability`); riskLevel = "HIGH"; }
    sustainabilityScore = Math.min(100, Math.max(0, sustainabilityScore));
    innovationScore = Math.min(100, Math.max(0, innovationScore + (nodes.length * 2)));
    return { score: Math.floor((sustainabilityScore + innovationScore) / 2), sustainabilityScore: Math.floor(sustainabilityScore), innovationScore: Math.floor(innovationScore), suggestions, riskLevel, failureProbability: Math.floor(failureProbability) };
  }

  // ========================= OpenRouter API CALL =========================
  async function callOpenRouter(apiKey, messages, systemHint = "") {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}`, "HTTP-Referer": window.location.href, "X-Title": "Eco Lab V6" },
      body: JSON.stringify({ model: "anthropic/claude-3.5-sonnet", max_tokens: 800, messages: [{ role: "system", content: systemHint || "You are Ecogreen AI, expert in civil, mechanical, and electrical engineering." }, ...messages] })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.choices[0].message.content;
  }

  // ========================= MAIN APP =========================
  function EcoLabV6() {
    const [state, dispatch] = useReducer(reducer, getInitialState());
    const [activeTab, setActiveTab] = useState("lab");
    const [searchTerm, setSearchTerm] = useState("");
    const [catFilter, setCatFilter] = useState("All");
    const [simRunning, setSimRunning] = useState(false);
    const [simData, setSimData] = useState({});
    const [aiReport, setAiReport] = useState(null);
    const [physicsReport, setPhysicsReport] = useState(null);
    const [toast, setToast] = useState(null);
    const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
    const [sidebarOpen, setSidebarOpen] = useState(false);
    const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE_KEYS.apiKey) || "");
    const [showKeyInput, setShowKeyInput] = useState(false);
    const [keyDraft, setKeyDraft] = useState("");
    const [aiLoading, setAiLoading] = useState(false);
    const [chatMessages, setChatMessages] = useState([{ role: "assistant", content: "🌱 **Ecogreen AI** ready! I specialize in Civil, Mechanical, and Electrical & Electronics engineering. Enter your OpenRouter API key to get started." }]);
    const [chatInput, setChatInput] = useState("");
    const workspaceRef = useRef(null);
    const simInterval = useRef(null);

    useEffect(() => {
      const handleResize = () => setIsMobile(window.innerWidth < 768);
      window.addEventListener("resize", handleResize);
      return () => window.removeEventListener("resize", handleResize);
    }, []);

    const currentField = FIELDS[state.field];
    const allComponents = currentField?.components || [];
    const categories = ["All", ...new Set(allComponents.map(c => c.cat))];
    const filtered = allComponents.filter(c => (catFilter === "All" || c.cat === catFilter) && (c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.cat.toLowerCase().includes(searchTerm.toLowerCase())));

    const showToast = (msg, type = "info") => { setToast({ msg, type }); setTimeout(() => setToast(null), 2400); };

    const saveApiKey = () => {
      if (!keyDraft.startsWith("sk-or")) { showToast("⚠️ Invalid OpenRouter key format", "warn"); return; }
      setApiKey(keyDraft);
      localStorage.setItem(STORAGE_KEYS.apiKey, keyDraft);
      setShowKeyInput(false);
      showToast("✅ API key saved!", "success");
    };

    // Simulation loop
    useEffect(() => {
      if (!simRunning) return;
      const interval = setInterval(() => {
        dispatch({ type: "TICK" });
        const report = physicsEngine(state.workspace, state.connections, state.simulationTime);
        const ai = aiBrain(report, state.workspace);
        setPhysicsReport(report);
        setAiReport(ai);
        dispatch({ type: "LOG", log: { report: { energy: report.energy, load: report.load, balance: report.balance }, ai: { score: ai.score }, time: state.simulationTime } });
        const newSimData = {};
        state.workspace.forEach(item => {
          if (item.power) newSimData[item.uid] = { value: (item.power * (0.7 + 0.3 * Math.sin(state.simulationTime * 0.4))).toFixed(0), unit: "W" };
          else if (item.load) newSimData[item.uid] = { value: (item.load * (0.8 + 0.2 * Math.sin(state.simulationTime * 0.5))).toFixed(0), unit: "W" };
        });
        setSimData(newSimData);
      }, ENGINE_CONFIG.tickRate);
      return () => clearInterval(interval);
    }, [simRunning, state.workspace, state.connections, state.simulationTime]);

    const onDragStart = (e, comp) => { e.dataTransfer.setData("comp", JSON.stringify(comp)); e.dataTransfer.effectAllowed = "copy"; };
    const onDrop = (e) => {
      e.preventDefault();
      const raw = e.dataTransfer.getData("comp");
      if (!raw) return;
      const comp = JSON.parse(raw);
      const rect = workspaceRef.current?.getBoundingClientRect();
      if (!rect) return;
      const x = e.clientX - rect.left - 46;
      const y = e.clientY - rect.top - 46;
      const uid = `${comp.id}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
      dispatch({ type: "ADD", payload: { ...comp, uid, x: Math.max(10, x), y: Math.max(10, y) } });
      showToast(`➕ Added ${comp.name}`, "success");
    };
    const moveItem = (uid, x, y) => { dispatch({ type: "MOVE", uid, x, y }); };
    const removeItem = (uid) => { dispatch({ type: "REMOVE", uid }); showToast(`🗑 Removed component`, "info"); };
    const connectComponents = (from, to) => {
      if (!from || !to) return;
      dispatch({ type: "CONNECT", from, to });
      showToast("✅ Connected!", "success");
    };
    const startSimulation = () => { if (simRunning) { if (simInterval.current) clearInterval(simInterval.current); setSimRunning(false); showToast("Simulation stopped"); } else { setSimRunning(true); showToast("Simulation started", "success"); } };
    const clearWorkspace = () => { dispatch({ type: "CLEAR" }); setSimRunning(false); setSimData({}); setAiReport(null); setPhysicsReport(null); showToast("Workspace cleared"); };
    const getConnPos = (uid) => { const item = state.workspace.find(w => w.uid === uid); return item ? { x: item.x + 48, y: item.y + 48 } : null; };

    const sendAIChat = async () => {
      if (!chatInput.trim()) return;
      if (!apiKey) { setShowKeyInput(true); showToast("Please enter OpenRouter API key", "warn"); return; }
      const userMsg = chatInput.trim();
      setChatInput("");
      setChatMessages(prev => [...prev, { role: "user", content: userMsg }]);
      setAiLoading(true);
      try {
        const context = `Current engineering field: ${currentField.label}. Workspace: ${state.workspace.length} components. Energy: ${physicsReport?.energy || 0}W, Load: ${physicsReport?.load || 0}W.`;
        const reply = await callOpenRouter(apiKey, [{ role: "user", content: `Context: ${context}\n\nUser: ${userMsg}` }], "You are Ecogreen AI, expert in civil, mechanical, and electrical engineering. Be helpful and concise.");
        setChatMessages(prev => [...prev, { role: "assistant", content: reply }]);
      } catch (err) { setChatMessages(prev => [...prev, { role: "assistant", content: `⚠️ Error: ${err.message}` }]); }
      setAiLoading(false);
    };

    const runAIAnalysis = async () => {
      if (state.workspace.length === 0) { showToast("Add components first!", "warn"); return; }
      if (!apiKey) { setShowKeyInput(true); showToast("Please enter OpenRouter API key", "warn"); return; }
      setAiLoading(true);
      const compList = state.workspace.map(w => w.name).join(", ");
      const prompt = `You are a strict JSON generator. Return ONLY valid JSON. Analyze this ${currentField.label} project.
Components: ${compList}. Connections: ${state.connections.length}. Renewable count: ${state.workspace.filter(w=>w.renewable).length}.
Return: { "sustainabilityScore": 0-100, "innovationScore": 0-100, "summary": "short", "strengths": ["s1","s2"], "improvements": ["i1","i2"], "ecoTip": "tip", "verdict": "verdict" }`;
      try {
        const raw = await callOpenRouter(apiKey, [{ role: "user", content: prompt }], "Return ONLY valid JSON. No markdown.");
        const cleaned = raw.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(cleaned);
        setChatMessages(prev => [...prev, { role: "assistant", content: `📊 **Analysis Complete**\n🌿 Sustainability: ${parsed.sustainabilityScore}/100\n🚀 Innovation: ${parsed.innovationScore}/100\n\n💡 ${parsed.ecoTip}\n\n🏆 ${parsed.verdict}` }]);
        showToast("Analysis complete!", "success");
      } catch (err) { showToast("AI analysis failed", "warn"); }
      setAiLoading(false);
    };

    const stats = useMemo(() => {
      const gen = state.workspace.reduce((s, w) => s + (w.power > 0 ? w.power : 0), 0);
      const load = state.workspace.reduce((s, w) => s + (w.load || 0), 0);
      return { gen, load, count: state.workspace.length };
    }, [state.workspace]);

    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#050a0f", color: "#eef2ff", overflow: "hidden" }}>
        {/* Header */}
        <div style={{ padding: "8px 20px", borderBottom: "1px solid #1f2a30", background: "rgba(3,7,12,0.95)", backdropFilter: "blur(10px)", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", zIndex: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ background: "linear-gradient(135deg, #00e5a0, #1b6e54)", width: 40, height: 40, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🌿</div>
            <div><span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 18 }}>Eco Lab V6</span><span style={{ fontSize: 9, marginLeft: 8, color: "#00e5a0" }}>Civil · Mechanical · Electrical</span></div>
          </div>
          {!isMobile && <div style={{ display: "flex", gap: 4 }}>{["lab", "ai", "logs"].map(t => (<button key={t} className={`tab-btn ${activeTab === t ? "active" : ""}`} onClick={() => setActiveTab(t)}>{t === "lab" ? "🔬 Workspace" : t === "ai" ? "🤖 AI Assistant" : "📋 Logs"}</button>))}</div>}
          <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
            <button onClick={() => setShowKeyInput(!showKeyInput)} style={{ background: apiKey ? "rgba(0,229,160,0.15)" : "rgba(245,158,11,0.15)", border: "1px solid", borderColor: apiKey ? "#00e5a0" : "#f59e0b", borderRadius: 24, padding: "4px 12px", fontSize: 11, cursor: "pointer" }}>{apiKey ? "🔑 API Active" : "🔓 Add API Key"}</button>
            <button onClick={startSimulation} style={{ background: simRunning ? "#aa2e2e" : "rgba(0,229,160,0.15)", border: "none", borderRadius: 24, padding: "5px 16px", color: simRunning ? "#ffa0a0" : "#00e5a0", cursor: "pointer" }}>{simRunning ? "⏹ Stop" : "▶ Simulate"}</button>
            <button onClick={clearWorkspace} style={{ background: "rgba(239,68,68,0.15)", border: "none", borderRadius: 24, padding: "5px 14px", color: "#f87171", cursor: "pointer" }}>🗑 Clear</button>
          </div>
        </div>

        {showKeyInput && (
          <div style={{ padding: "8px 20px", background: "#0d171f", borderBottom: "1px solid #f59e0b40", display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 12 }}>🔑 OpenRouter API Key (<a href="https://openrouter.ai/keys" target="_blank" style={{ color: "#00e5a0" }}>get key</a>)</span>
            <input type="password" placeholder="sk-or-v1-..." value={keyDraft} onChange={e => setKeyDraft(e.target.value)} style={{ flex: 1, minWidth: 200, background: "#111c24", border: "1px solid #475569", borderRadius: 8, padding: "6px 12px", color: "white", fontSize: 12 }} />
            <button onClick={saveApiKey} style={{ background: "#00e5a0", border: "none", borderRadius: 6, padding: "5px 20px", fontWeight: "bold", cursor: "pointer" }}>Save</button>
            <button onClick={() => setShowKeyInput(false)} style={{ background: "transparent", border: "none", color: "#94a3b8", cursor: "pointer" }}>✕</button>
          </div>
        )}

        <div className="power-badge">
          ⚡ Gen: <strong style={{ color: "#00e5a0" }}>{stats.gen} W</strong> | 🔌 Load: <strong style={{ color: "#f59e0b" }}>{stats.load} W</strong> | 🧩 {stats.count} components | ⏱️ Tick: {state.simulationTime}
          {physicsReport && <span style={{ marginLeft: 12 }}>🔋 Battery: {physicsReport.batteryHealth?.toFixed(0)}% | ⚡ {physicsReport.voltage?.toFixed(1)}V</span>}
        </div>

        <div style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>
          {/* Sidebar with THREE FIELDS */}
          {activeTab === "lab" && !isMobile && (
            <div style={{ width: 280, background: "#0a1117", borderRight: "1px solid #1f2a30", display: "flex", flexDirection: "column", overflowY: "auto" }}>
              <div style={{ padding: 16 }}>
                <div style={{ fontSize: 11, color: "#5b6e7c", letterSpacing: 1, marginBottom: 12 }}>🏗️ ENGINEERING FIELDS</div>
                {Object.entries(FIELDS).map(([key, field]) => (
                  <button key={key} className={`field-btn ${state.field === key ? "active" : ""}`} onClick={() => { dispatch({ type: "SET_FIELD", field: key }); setCatFilter("All"); setSearchTerm(""); }}>
                    <span className="field-icon">{field.icon}</span>
                    <div style={{ display: "inline-block", verticalAlign: "middle" }}>
                      <div style={{ fontWeight: 700 }}>{field.label}</div>
                      <div style={{ fontSize: 9, color: "#64748b" }}>{field.components.length} components</div>
                    </div>
                  </button>
                ))}
                <div style={{ marginTop: 16, fontSize: 10, color: "#475569", padding: 8, background: "rgba(0,229,160,0.05)", borderRadius: 8 }}>
                  📍 {currentField.description}
                </div>
              </div>
              <div style={{ padding: "8px 12px" }}><input placeholder="🔍 Search components" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{ width: "100%", background: "#0f171f", border: "1px solid #2a3a2f", borderRadius: 10, padding: "7px", fontSize: 12, color: "white" }} /></div>
              <div style={{ padding: "0 12px 8px", display: "flex", gap: 6, flexWrap: "wrap" }}>{categories.slice(0, 8).map(c => (<button key={c} onClick={() => setCatFilter(c)} style={{ fontSize: 10, background: catFilter === c ? "#00e5a0" : "#1e2a30", border: "none", borderRadius: 20, padding: "4px 12px", cursor: "pointer", color: catFilter === c ? "#050a0f" : "#b0c4de" }}>{c}</button>))}</div>
              <div style={{ flex: 1, overflowY: "auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, padding: 12 }}>
                {filtered.map(c => (<div key={c.id} draggable onDragStart={e => onDragStart(e, c)} className="comp-card"><div style={{ fontSize: 28 }}>{c.icon || "🔧"}</div><div style={{ fontSize: 10, fontWeight: 600 }}>{c.name}</div><div style={{ fontSize: 8, color: "#8da0b0" }}>{c.cat}</div>{c.renewable && <span style={{ fontSize: 9, color: "#00e5a0" }}>♻</span>}</div>))}
              </div>
            </div>
          )}

          {/* Workspace Canvas */}
          {activeTab === "lab" && (
            <div ref={workspaceRef} onDrop={onDrop} onDragOver={e => e.preventDefault()} style={{ flex: 1, position: "relative", background: "#050a0f", overflow: "hidden" }}>
              <svg style={{ position: "absolute", width: "100%", height: "100%", pointerEvents: "none" }}>
                <defs><pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#2a5a4a" /></pattern></defs>
                <rect width="100%" height="100%" fill="url(#dotGrid)" />
                {state.connections.map(conn => { const a = getConnPos(conn.from); const b = getConnPos(conn.to); if (!a || !b) return null; return <path key={conn.id} d={`M ${a.x} ${a.y} Q ${(a.x+b.x)/2} ${a.y} ${(a.x+b.x)/2} ${b.y} ${b.x} ${b.y}`} stroke={simRunning ? "#00e5a0" : "#4f8a6f"} strokeWidth="2" fill="none" strokeDasharray="5 3" />; })}
              </svg>
              {state.workspace.map(item => {
                const dragProps = { onMouseDown: (e) => { if (e.target.closest(".ws-btn")) return; let sx = e.clientX, sy = e.clientY; const move = (ev) => { moveItem(item.uid, item.x + (ev.clientX - sx), item.y + (ev.clientY - sy)); sx = ev.clientX; sy = ev.clientY; }; const up = () => { document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); }; document.addEventListener("mousemove", move); document.addEventListener("mouseup", up); } };
                return (<div key={item.uid} {...dragProps} style={{ position: "absolute", left: item.x, top: item.y, width: 92, cursor: "grab", zIndex: 10 }} onClick={() => connectComponents(state.selected, item.uid)}>
                  <div className="ws-item" style={{ border: "2px solid #2a5a4a", padding: "8px 4px", textAlign: "center" }}>
                    <div style={{ fontSize: 28 }}>{item.icon || "🔧"}</div>
                    <div style={{ fontSize: 9, fontWeight: 600 }}>{item.name}</div>
                    {simData[item.uid] && <div style={{ fontSize: 8, color: "#00e5a0" }}>{simData[item.uid].value}{simData[item.uid].unit}</div>}
                    <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 6 }}>
                      <button className="ws-btn" onClick={(e) => { e.stopPropagation(); connectComponents(item.uid, state.selected); }} style={{ background: "#00e5a040", border: "none", borderRadius: 20, padding: "2px 8px", cursor: "pointer" }}>🔗</button>
                      <button className="ws-btn" onClick={(e) => { e.stopPropagation(); removeItem(item.uid); }} style={{ background: "#ff444450", border: "none", borderRadius: 20, padding: "2px 8px", cursor: "pointer" }}>✕</button>
                    </div>
                  </div>
                </div>);
              })}
              {state.workspace.length === 0 && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#2c6a4a", fontSize: 18, pointerEvents: "none", textAlign: "center" }}>🌿 Drag components from the sidebar<br/>⚡ Civil · Mechanical · Electrical & Electronics</div>}
            </div>
          )}

          {/* AI Chat Panel */}
          {activeTab === "ai" && (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 20, gap: 16, overflow: "auto", background: "#080f14" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                <h2>🤖 Ecogreen AI Assistant</h2>
                <button onClick={runAIAnalysis} disabled={aiLoading || !apiKey} style={{ background: "rgba(139,92,246,0.2)", border: "none", borderRadius: 24, padding: "6px 20px", color: "#c4b5fd", cursor: "pointer" }}>{aiLoading ? "⏳ Analyzing..." : "📊 Analyze Project"}</button>
              </div>
              <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12, background: "#0f171f", borderRadius: 24, padding: 16 }}>
                {chatMessages.map((m, i) => (<div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}><div style={{ maxWidth: "80%", background: m.role === "user" ? "rgba(0,229,160,0.1)" : "#18232c", borderRadius: 20, padding: "10px 16px", fontSize: 13 }}><div style={{ whiteSpace: "pre-wrap" }}>{m.content}</div></div></div>))}
                {aiLoading && <div className="sim-pulse" style={{ padding: 10, color: "#00e5a0" }}>⏳ AI is thinking...</div>}
              </div>
              <div style={{ display: "flex", gap: 10 }}><input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendAIChat()} placeholder="Ask about sustainable design, energy systems, structural analysis..." style={{ flex: 1, background: "#0f171f", border: "1px solid #2a5a4a", borderRadius: 40, padding: "12px 18px", color: "white", outline: "none" }} /><button onClick={sendAIChat} disabled={!apiKey} style={{ background: "#00e5a0", border: "none", borderRadius: 40, padding: "0 24px", fontWeight: 700, cursor: "pointer" }}>Send</button></div>
            </div>
          )}

          {/* Logs Panel */}
          {activeTab === "logs" && (
            <div style={{ flex: 1, padding: 24, overflow: "auto", background: "#080f14" }}>
              <h2>📋 System Event Logs</h2>
              <div style={{ marginTop: 16, fontFamily: "monospace" }}>{state.logs.map((log, i) => (<div key={i} className="log-entry"><span style={{ color: "#00e5a0" }}>[Tick {log.time}]</span> AI Score: {log.ai?.score} | Energy: {log.report?.energy?.toFixed(0)}W | Load: {log.report?.load?.toFixed(0)}W | Balance: {log.report?.balance?.toFixed(0)}</div>))}{state.logs.length === 0 && <div style={{ color: "#475569", padding: 20 }}>No logs yet. Run simulation to generate data.</div>}</div>
            </div>
          )}
        </div>

        {toast && <div className="toast-msg" style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#0f2128", borderLeft: `4px solid ${toast.type === "success" ? "#00e5a0" : "#f59e0b"}`, padding: "8px 20px", borderRadius: 40, zIndex: 2000 }}>{toast.msg}</div>}
        {isMobile && activeTab === "lab" && <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ position: "fixed", bottom: 20, right: 20, width: 56, height: 56, borderRadius: 30, background: "#00e5a0", border: "none", fontSize: 26, zIndex: 300 }}>📦</button>}
        {sidebarOpen && isMobile && <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0c1a22", borderTop: "2px solid #00e5a0", maxHeight: "60vh", overflowY: "auto", padding: 16, zIndex: 400 }}><div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>{filtered.map(c => (<div key={c.id} onClick={() => { const uid = `${c.id}_${Date.now()}`; dispatch({ type: "ADD", payload: { ...c, uid, x: Math.random() * 200 + 40, y: Math.random() * 150 + 40 } }); setSidebarOpen(false); }} style={{ background: "#1e2e32", borderRadius: 16, padding: 6, textAlign: "center" }}><div style={{ fontSize: 28 }}>{c.icon || "🔧"}</div><div style={{ fontSize: 9 }}>{c.name}</div></div>))}</div></div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<EcoLabV6 />);
</script>
</body>
</html>
